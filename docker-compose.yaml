services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-master
    hostname: ${MASTER_ID}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./tailscale/state:/var/lib/tailscale
    env_file:
      - ./config/master.env
    networks:
      - fabric
    restart: unless-stopped

