services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-sidecar
    hostname: ${WORKER_ID}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./tailscale/state:/var/lib/tailscale
    env_file:
      - ./config/worker.env
    networks:
      - fabric-mesh
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio
    networks:
      - fabric-mesh
    ports:
      - "12000:9000"
      - "9000:9001"
    depends_on:
      - tailscale
    env_file:
      - ./config/worker.env
    volumes:
      - ./storage/data:/data
    command: server /data --console-address ":9001"

  fabric-peer:
    image: hyperledger/fabric-peer:2.4
    container_name: fabric-worker-1
    networks:
      - fabric-mesh
    ports:
      - "7051:7051"
    depends_on:
      - tailscale
    env_file:
      - ./config/worker.env
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=fabric-worker-1
      - CORE_PEER_ADDRESS=fabric-worker-1:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=fabric-worker-1:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=fabric-worker-1:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=fabric-worker-1:7051
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - CORE_METRICS_PROVIDER=prometheus
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto/crypto-config/peerOrganizations/org1.example.com/peers/fabric-worker-1.org1.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto/crypto-config/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp:/etc/hyperledger/fabric/admin-msp
      - ./crypto/config:/etc/hyperledger/fabric/config
      - ./crypto/crypto-config/peerOrganizations/org1.example.com/peers/fabric-worker-1.org1.example.com/tls:/etc/hyperledger/fabric/tls
      - ./crypto/crypto-config/peerOrganizations/org1.example.com/peers/fabric-worker-1.org1.example.com/tls/ca.crt:/etc/hyperledger/fabric/tls/ca.crt
      - ./crypto/crypto-config/ordererOrganizations/example.com/orderers/fabric-master.example.com/tls/ca.crt:/etc/hyperledger/fabric/tls/orderer-ca.crt
      - ./storage/peer:/var/hyperledger/production

  worker-daemon:
    build: ./daemon
    container_name: worker-daemon
    networks:
      - fabric-mesh
    depends_on:
      - tailscale
      - minio
      - fabric-peer
    env_file:
      - ./config/worker.env
    environment:
      - MINIO_ENDPOINT=minio:9000
      - FABRIC_PEER_ADDRESS=fabric-peer:7051

networks:
  fabric-mesh:
    external: true
    name: fabric-mesh