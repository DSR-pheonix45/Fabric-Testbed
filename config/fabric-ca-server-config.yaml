port: 7054
debug: false
crlsizelimit: 512000
tls:
  enabled: false
ca:
  name: ca-master
  certfile:
  keyfile:
registry:
  maxenrollments: -1
  identities:
     - name: admin
       pass: adminpw
       type: client
       affiliation: ""
       attrs:
          hf.Registrar.Roles: "*"
          hf.Registrar.DelegateRoles: "*"
          hf.Revoker: true
          hf.IntermediateCA: true
          hf.GenCRL: true
          hf.Registrar.Attributes: "*"
          hf.AffiliationMgr: true
database:
  type: sqlite3
  datasource: fabric-ca-server.db
affiliations:
   org1:
      - department1
      - department2
csr:
   cn: fabric-ca
   names:
      - C: US
        ST: North Carolina
        L:
        O: Hyperledger
        OU: Fabric
   hosts:
     - fabric-master
     - localhost
   ca:
      expiry: 131400h
      pathlength: 1
signing:
    default:
      usage:
        - digital signature
      expiry: 8760h
    profiles:
      ca:
         usage:
           - cert sign
           - crl sign
         expiry: 43800h
         cautils:
            ca: true
            pathlen: 1
      tls:
         usage:
            - signing
            - key encipherment
            - server auth
            - client auth
         expiry: 8760h
